# Jarvis-HEP IO YAML shape accepted by jportal.
observables:
  x: 1.5
  y: 10.0

input:
  - name: params
    path: "input.json"
    type: JSON
    save: false
    actions:
      - type: Dump
        variables:
          - { name: "xx", expression: "x * Pi" }
          - { name: "yy", expression: "y * Pi" }
          - { name: "cx", expression: "(x + y) * Pi", entry: "test.config.x" }

output:
  - name: observables
    path: "output.json"
    type: JSON
    save: false
    variables:
      - { name: "z" }
      - { name: "likelihood", entry: "fit.loglike" }
