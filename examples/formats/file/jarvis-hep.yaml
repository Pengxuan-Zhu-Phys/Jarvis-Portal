# Jarvis-HEP-facing calculator IO example.
# File output is useful for preserving raw calculator artifacts.
Calculators:
  make_paraller: 1
  Modules:
    - name: FileExample
      required_modules: []
      clone_shadow: false
      installation: []
      initialization: []
      execution:
        path: "&J/calculators/file_example"
        commands:
          - "python run_file_example.py"
        input: []
        output:
          - name: raw_log
            path: "run.log"
            type: File
            save: true
            variables: []
