# Jarvis-HEP IO YAML shape accepted by jportal.
output:
  - path: "output.xslha"
    type: xSLHA
    variables:
      - name: mh
        block: MASS
        entry: 25
      - name: h_width_1l
        block: DECAY1L
        entry: 25
      - name: h_to_bb
        block: DECAY
        entry: [25, 5, -5]
